server {
    listen 80;
    server_name _;
    root /usr/share/nginx/html;
    index index.html;

    # Ensure .mjs files are served with correct MIME type
    types {
        text/html                             html htm;
        text/css                              css;
        application/javascript                js mjs;
        application/json                      json;
        application/pdf                       pdf;
        image/png                             png;
        image/svg+xml                         svg;
        application/wasm                      wasm;
        application/octet-stream              bcmap;
    }

    # Serve PDFs
    location /pdfs/ {
        alias /usr/share/nginx/html/pdfs/;
        add_header Cache-Control "no-cache";
    }

    # PDF.js library
    location /pdfjs/ {
        alias /usr/share/nginx/html/pdfjs/;
    }

    # Sets manifest - no cache so updates appear immediately
    location = /sets.json {
        add_header Cache-Control "no-cache, no-store";
    }

    # Landing page and viewer
    location / {
        try_files $uri $uri/ /index.html;
    }
}
